<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Overdrive - Premium Arcade</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff007f;
            --neon-purple: #9d00ff;
            --dark-bg: #06060c;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 540px;
            max-height: 960px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #111126 0%, #06060c 100%);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.15);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain; /* FIX: Prevents stretching on modern tall phones */
        }
        /* Sleek minimalist HUD overlays */
        .hud-element {
            position: absolute;
            pointer-events: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }
        #score-display {
            top: 25px;
            left: 25px;
            font-size: 20px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        #level-display {
            top: 25px;
            right: 25px;
            font-size: 20px;
            color: var(--neon-pink);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
            text-align: right;
        }
        #hint-display {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-display" class="hud-element">SCORE: 0</div>
        <div id="level-display" class="hud-element">LVL: 1</div>
        <div id="hint-display" class="hud-element">Drag / Swipe anywhere to fly • Autofire Active</div>
        <canvas id="arcadeCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('arcadeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const levelDisplay = document.getElementById('level-display');

        // Force high-resolution internal canvas dimensions for crisp graphics
        const GAME_WIDTH = 450;
        const GAME_HEIGHT = 800;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // Global Game States
        let score = 0;
        let level = 1;
        const MAX_LEVEL = 1000;
        let gameOver = false;
        let gameActive = false;
        let frameCount = 0;
        let screenShake = 0;

        // Entities arrays
        let stars = [];
        let lasers = [];
        let enemies = [];
        let particles = [];
        let floatingTexts = [];

        // Engine / Tuning Parameters
        const CONFIG = {
            playerSpeedLerp: 0.2, // Slightly snappier controls
            laserSpeed: 16,       // Faster lasers
            fireRate: 7,          // Faster autofire for easier play (lower is faster)
        };

        // Initialize Background Parallax Starfield
        for (let i = 0; i < 60; i++) {
            stars.push({
                x: Math.random() * GAME_WIDTH,
                y: Math.random() * GAME_HEIGHT,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 0.5,
                color: Math.random() > 0.5 ? '#00f3ff' : '#ff007f'
            });
        }

        // Premium Particle System Engine
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98; // Drag friction
                this.vy *= 0.98;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        // Floating Damage/Score Text Numbers
        class FloatingText {
            constructor(x, y, text, color, isLarge = false) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.alpha = 1;
                this.vy = -1.5;
                this.isLarge = isLarge;
            }
            update() {
                this.y += this.vy;
                this.alpha -= this.isLarge ? 0.015 : 0.025; // Large text fades slower
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.font = this.isLarge ? '900 24px system-ui' : 'bold 16px system-ui';
                ctx.fillStyle = this.color;
                ctx.textAlign = 'center';
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        // Player Object Config
        const player = {
            x: GAME_WIDTH / 2,
            y: GAME_HEIGHT - 120,
            targetX: GAME_WIDTH / 2,
            targetY: GAME_HEIGHT - 120,
            width: 44,
            height: 48,
            tilt: 0,
            
            update() {
                // Smoothly slide ship position toward touch targets (Lerp Math)
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                
                this.x += dx * CONFIG.playerSpeedLerp;
                this.y += dy * CONFIG.playerSpeedLerp;

                // Subtle dynamic tilting animation based on sliding speed
                this.tilt = dx * 0.04;
                if(this.tilt > 0.4) this.tilt = 0.4;
                if(this.tilt < -0.4) this.tilt = -0.4;

                // Enforce safety barriers
                if (this.x < this.width) this.x = this.width;
                if (this.x > GAME_WIDTH - this.width) this.x = GAME_WIDTH - this.width;
                if (this.y < 200) this.y = 200; // Limit how high they can drag up
                if (this.y > GAME_HEIGHT - 60) this.y = GAME_HEIGHT - 60;

                // PREMIUM AUTOFIRE TRIGGER ENGINE
                if (gameActive && !gameOver && frameCount % CONFIG.fireRate === 0) {
                    lasers.push({ x: this.x - 14, y: this.y - 15 });
                    lasers.push({ x: this.x + 14, y: this.y - 15 });
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.tilt);

                // Glow Engine FX
                ctx.shadowBlur = 15;
                ctx.shadowColor = varColor('--neon-cyan');

                // Engine Trail Flames
                ctx.fillStyle = frameCount % 2 === 0 ? 'rgba(255,0,127,0.8)' : 'rgba(0,243,255,0.8)';
                ctx.beginPath();
                ctx.moveTo(-6, 20);
                ctx.lineTo(0, 32 + Math.random()*8);
                ctx.lineTo(6, 20);
                ctx.fill();

                // Sleek Premium Vector Spacefighter Chassis Art
                ctx.fillStyle = '#111122';
                ctx.strokeStyle = varColor('--neon-cyan');
                ctx.lineWidth = 3;
                
                ctx.beginPath();
                ctx.moveTo(0, -24);        // Nose cone
                ctx.lineTo(16, 12);        // Right wingtip
                ctx.lineTo(6, 18);         // Right aft bulkhead
                ctx.lineTo(-6, 18);        // Left aft bulkhead
                ctx.lineTo(-16, 12);       // Left wingtip
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Canopy Glass Accent
                ctx.fillStyle = varColor('--neon-pink');
                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(5, 5);
                ctx.lineTo(-5, 5);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        };

        // Enemy Drone Class Engine
        class Enemy {
            constructor() {
                this.width = 36;
                this.height = 32;
                this.x = Math.random() * (GAME_WIDTH - 80) + 40;
                this.y = -40;
                
                // DIFFICULTY SCALING: Speed slowly increases with level
                let speedCap = 1.2 + (level * 0.005);
                this.speed = speedCap + Math.random(); 
                
                this.pulseFactor = Math.random() * 10;
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin((frameCount + this.pulseFactor) * 0.04) * 0.8;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                ctx.shadowBlur = 12;
                ctx.shadowColor = varColor('--neon-pink');
                ctx.fillStyle = '#181224';
                ctx.strokeStyle = varColor('--neon-pink');
                ctx.lineWidth = 2.5;

                // Modern Geometric Aggressive Polygon Grid Shapes
                ctx.beginPath();
                ctx.moveTo(0, 16);          
                ctx.lineTo(18, -12);        
                ctx.lineTo(8, -16);         
                ctx.lineTo(-8, -16);        
                ctx.lineTo(-18, -12);       
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Core glowing eye reactor matrix
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(0, -2, 4, 0, Math.PI*2);
                ctx.fill();

                ctx.restore();
            }
        }

        function varColor(name) {
            return name === '--neon-cyan' ? '#00f3ff' : '#ff007f';
        }

        function updateTargetFromTouch(e) {
            if (gameOver) return;
            if (!gameActive) gameActive = true;

            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            
            const touchX = (touch.clientX - rect.left) * (GAME_WIDTH / rect.width);
            const touchY = (touch.clientY - rect.top) * (GAME_HEIGHT / rect.height);
            
            player.targetX = touchX;
            player.targetY = touchY - 40; 
        }

        window.addEventListener('touchstart', (e) => {
            if(gameOver) {
                resetGame();
                e.preventDefault();
                return;
            }
            updateTargetFromTouch(e);
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            updateTargetFromTouch(e);
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('mousemove', (e) => {
            if (!gameActive || gameOver) return;
            const rect = canvas.getBoundingClientRect();
            player.targetX = (e.clientX - rect.left) * (GAME_WIDTH / rect.width);
            player.targetY = (e.clientY - rect.top) * (GAME_HEIGHT / rect.height) - 40;
        });
        
        canvas.addEventListener('click', () => {
            if (!gameActive) gameActive = true;
            if (gameOver) resetGame();
        });

        function createExplosion(x, y, color) {
            screenShake = 12; 
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function resetGame() {
            score = 0;
            level = 1;
            scoreDisplay.innerText = "SCORE: 0";
            levelDisplay.innerText = "LVL: 1";
            gameOver = false;
            gameActive = true;
            lasers = [];
            enemies = [];
            particles = [];
            floatingTexts = [];
            player.x = GAME_WIDTH / 2;
            player.y = GAME_HEIGHT - 120;
            player.targetX = GAME_WIDTH / 2;
            player.targetY = GAME_HEIGHT - 120;
            frameCount = 0;
        }

        // Primary High-Performance Render Loop Architecture
        function loop() {
            // FIX: Clear Canvas BEFORE applying screen shake transforms
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            ctx.save();
            
            if (screenShake > 0) {
                const dx = (Math.random() - 0.5) * screenShake;
                const dy = (Math.random() - 0.5) * screenShake;
                ctx.translate(dx, dy);
                screenShake *= 0.85; 
                if(screenShake < 0.5) screenShake = 0;
            }

            // 1. Draw Starfield Background Parallax Layers
            stars.forEach(star => {
                ctx.fillStyle = star.color;
                ctx.globalAlpha = 0.4;
                ctx.fillRect(star.x, star.y, star.size, star.size);
                ctx.globalAlpha = 1.0;
                star.y += star.speed;
                if (star.y > GAME_HEIGHT) {
                    star.y = 0;
                    star.x = Math.random() * GAME_WIDTH;
                }
            });

            if (!gameActive) {
                drawPremiumOverlay("NEON OVERDRIVE", "Swipe screen to deploy", varColor('--neon-cyan'));
            } else if (gameOver) {
                drawPremiumOverlay("SYSTEM CRASH", `LVL: ${level} | SCORE: ${score}`, varColor('--neon-pink'), "TAP TO REBOOT");
            } else {
                frameCount++;

                player.update();
                player.draw();

                // Manage Autofire Lasers
                for (let i = lasers.length - 1; i >= 0; i--) {
                    lasers[i].y -= CONFIG.laserSpeed;
                    
                    ctx.save();
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = varColor('--neon-cyan');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(lasers[i].x - 2, lasers[i].y, 4, 16);
                    ctx.restore();

                    if (lasers[i].y < -20) lasers.splice(i, 1);
                }

                // DIFFICULTY SCALING: Spawn rate calculation based on Level
                // Starts at 65 frames (slow), caps at 20 frames (fast) at very high levels
                let currentSpawnRate = Math.max(20, 65 - Math.floor(level * 0.04));
                
                if (frameCount % currentSpawnRate === 0) {
                    enemies.push(new Enemy());
                }

                // Process Active Interceptors & Hazard Arrays
                for (let i = enemies.length - 1; i >= 0; i--) {
                    enemies[i].update();
                    enemies[i].draw();

                    // Boundary leak failure configuration
                    if (enemies[i].y > GAME_HEIGHT + 30) {
                        gameOver = true;
                        createExplosion(enemies[i].x, GAME_HEIGHT - 20, varColor('--neon-pink'));
                        enemies.splice(i, 1);
                        continue;
                    }

                    // Direct Ship Collision Engine (Hitbox slightly forgiving for easier play)
                    const distToPlayerX = Math.abs(enemies[i].x - player.x);
                    const distToPlayerY = Math.abs(enemies[i].y - player.y);
                    if (distToPlayerX < 28 && distToPlayerY < 28) {
                        gameOver = true;
                        createExplosion(player.x, player.y, varColor('--neon-cyan'));
                        createExplosion(enemies[i].x, enemies[i].y, varColor('--neon-pink'));
                        enemies.splice(i, 1);
                        continue;
                    }

                    // Bullet Intercept Detection
                    for (let j = lasers.length - 1; j >= 0; j--) {
                        const dx = Math.abs(enemies[i].x - lasers[j].x);
                        const dy = Math.abs(enemies[i].y - lasers[j].y);

                        if (dx < 26 && dy < 26) {
                            // Hit confirmed
                            score += 10;
                            
                            // LEVEL UP LOGIC (1 level per 100 score)
                            let newLevel = Math.min(MAX_LEVEL, Math.floor(score / 100) + 1);
                            if (newLevel > level) {
                                level = newLevel;
                                levelDisplay.innerText = `LVL: ${level}`;
                                floatingTexts.push(new FloatingText(GAME_WIDTH/2, GAME_HEIGHT/2 - 80, `LEVEL ${level}`, varColor('--neon-cyan'), true));
                            }

                            scoreDisplay.innerText = `SCORE: ${score}`;
                            
                            floatingTexts.push(new FloatingText(enemies[i].x, enemies[i].y, "+10", varColor('--neon-cyan')));
                            createExplosion(enemies[i].x, enemies[i].y, varColor('--neon-pink'));
                            
                            enemies.splice(i, 1);
                            lasers.splice(j, 1);
                            break;
                        }
                    }
                }
            }

            // 2. Render Premium Particle FX Layers Over Objects
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            // 3. Float Score/Level Indicators
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].update();
                floatingTexts[i].draw();
                if (floatingTexts[i].alpha <= 0) floatingTexts.splice(i, 1);
            }

            ctx.restore();
            requestAnimationFrame(loop);
        }

        function drawPremiumOverlay(title, subtitle, accentColor, subAction = "") {
            ctx.save();
            ctx.textAlign = 'center';
            
            ctx.fillStyle = 'rgba(6, 6, 12, 0.75)';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            ctx.shadowBlur = 20;
            ctx.shadowColor = accentColor;
            ctx.fillStyle = '#ffffff';
            ctx.font = '900 36px system-ui';
            ctx.fillText(title, GAME_WIDTH / 2, GAME_HEIGHT / 2 - 40);

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.font = '600 16px system-ui';
            ctx.fillText(subtitle, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 15);

            if(subAction !== "") {
                ctx.fillStyle = accentColor;
                ctx.font = '800 14px system-ui';
                ctx.fillText(subAction, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 75);
            }

            ctx.restore();
        }

        loop();
    </script>
</body>
</html>
