<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kid Friendly Space Shooter - Mobile Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10;
            color: white;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow: hidden;
            /* Prevents long-press menus and selecting text on mobile */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }
        h1 {
            color: #66fcf1;
            margin: 10px 0 5px 0;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        /* Responsive Canvas scaling for mobile screens */
        canvas {
            background-color: #1f2833;
            border: 4px solid #45a29e;
            border-radius: 12px;
            box-shadow: 0 0 15px #66fcf1;
            max-width: 92vw;
            max-height: 55vh;
            width: 100%;
            height: auto;
            aspect-ratio: 500 / 600;
        }
        /* Mobile Gamepad Touch Controls Layout */
        #mobileControls {
            display: flex;
            width: 95vw;
            max-width: 500px;
            justify-content: space-between;
            margin-top: 15px;
            padding-bottom: 20px;
        }
        .control-btn {
            background-color: #45a29e;
            color: white;
            border: 3px solid #66fcf1;
            border-radius: 15px;
            font-size: 32px;
            font-weight: bold;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 6px #1f2833;
            touch-action: manipulation;
            transition: all 0.05s ease;
        }
        /* Visual feedback when kid taps the buttons */
        .control-btn:active {
            background-color: #66fcf1;
            color: #0b0c10;
            transform: translateY(4px);
            box-shadow: 0 2px #1f2833;
        }
        #btnLeft, #btnRight {
            width: 28%;
        }
        #btnFire {
            width: 38%;
            background-color: #ffc107;
            border-color: #ffe082;
            font-size: 24px;
        }
        #btnFire:active {
            background-color: #ffe082;
        }
    </style>
</head>
<body>

    <h1>🚀 Star Defender! 🚀</h1>
    <canvas id="gameCanvas" width="500" height="600"></canvas>
    
    <div id="mobileControls">
        <button id="btnLeft" class="control-btn">◀</button>
        <button id="btnFire" class="control-btn">🌟 FIRE</button>
        <button id="btnRight" class="control-btn">▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State Variables
        let score = 0;
        let gameOver = false;
        let frameCount = 0;

        // Input Tracking States
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            Space: false
        };

        // --- DESKTOP KEYBOARD CONTROLS ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.code === 'ArrowRight') keys.ArrowRight = true;
            if (e.code === 'Space') keys.Space = true;
            if (e.code === 'Space') e.preventDefault();
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.code === 'ArrowRight') keys.ArrowRight = false;
            if (e.code === 'Space') keys.Space = false;
        });

        // --- MOBILE TOUCH CONTROLS ---
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnFire = document.getElementById('btnFire');

        // Left Button Events
        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowLeft = true; });
        btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); keys.ArrowLeft = false; });
        
        // Right Button Events
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowRight = true; });
        btnRight.addEventListener('touchend', (e) => { e.preventDefault(); keys.ArrowRight = false; });

        // Fire Button Events
        btnFire.addEventListener('touchstart', (e) => { e.preventDefault(); keys.Space = true; });
        btnFire.addEventListener('touchend', (e) => { e.preventDefault(); keys.Space = false; });

        // Touch Canvas to Restart when Game Over
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameOver) resetGame();
        });
        canvas.addEventListener('click', () => {
            if (gameOver) resetGame();
        });

        // Player Object Setup
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            size: 40,
            speed: 6, // Slightly faster movement for snappy mobile feel
            cooldown: 0,
            draw() {
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🚀', this.x, this.y);
            },
            update() {
                if (keys.ArrowLeft && this.x > this.size / 2) this.x -= this.speed;
                if (keys.ArrowRight && this.x < canvas.width - this.size / 2) this.x += this.speed;
                
                // Continuous shooting if button is held down, with a friendly cooldown rate
                if (keys.Space && this.cooldown <= 0) {
                    stars.push(new Star(this.x, this.y - 20));
                    this.cooldown = 12; 
                }
                if (this.cooldown > 0) this.cooldown--;
            }
        };

        // Arrays to manage entities
        let stars = [];
        let aliens = [];
        let backgroundDots = [];

        // Build Twinkling Background
        for(let i = 0; i < 40; i++) {
            backgroundDots.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2,
                speed: Math.random() * 1 + 0.5
            });
        }

        // Projectile Class (Star Power-ups)
        class Star {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 22;
                this.speed = 8;
            }
            draw() {
                ctx.font = `${this.size}px Arial`;
                ctx.fillText('⭐', this.x, this.y);
            }
            update() {
                this.y -= this.speed;
            }
        }

        // Enemy Class (Silly Space Aliens)
        class Alien {
            constructor() {
                this.size = 35;
                this.x = Math.random() * (canvas.width - this.size * 2) + this.size;
                this.y = -30;
                // Perfect slower speed adjustments for kids playing on touch screens
                this.speed = Math.random() * 1.5 + 1.5; 
            }
            draw() {
                ctx.font = `${this.size}px Arial`;
                ctx.fillText('👾', this.x, this.y);
            }
            update() {
                this.y += this.speed;
            }
        }

        // Circular Collision Math Helper
        function checkCollision(obj1, obj2, distanceThreshold) {
            const dx = obj1.x - obj2.x;
            const dy = obj1.y - obj2.y;
            return Math.sqrt(dx * dx + dy * dy) < distanceThreshold;
        }

        // Refresh/Restart state cleaner
        function resetGame() {
            score = 0;
            gameOver = false;
            stars = [];
            aliens = [];
            player.x = canvas.width / 2;
            // Clear keys in case touch got stuck on reset
            keys.ArrowLeft = false;
            keys.ArrowRight = false;
            keys.Space = false;
            gameLoop();
        }

        // Engine Loop Function
        function gameLoop() {
            if (gameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Background Stars
            ctx.fillStyle = '#ffffff';
            backgroundDots.forEach(dot => {
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, dot.radius, 0, Math.PI * 2);
                ctx.fill();
                dot.y += dot.speed;
                if(dot.y > canvas.height) {
                    dot.y = 0;
                    dot.x = Math.random() * canvas.width;
                }
            });

            // Handle Character Math and Drawing
            player.update();
            player.draw();

            // Spawn rate generator
            frameCount++;
            if (frameCount % 65 === 0) {
                aliens.push(new Alien());
            }

            // Clean & Move Shots
            for (let i = stars.length - 1; i >= 0; i--) {
                stars[i].update();
                stars[i].draw();
                if (stars[i].y < -20) {
                    stars.splice(i, 1);
                }
            }

            // Collision Engines & Bound Checks
            for (let i = aliens.length - 1; i >= 0; i--) {
                aliens[i].update();
                aliens[i].draw();

                // Hit detection on Player
                if (checkCollision(player, aliens[i], 32)) {
                    endGame("Oh no! An alien bumped your rocket!");
                    return;
                }

                // Laser Star collision checking
                let alienRemoved = false;
                for (let j = stars.length - 1; j >= 0; j--) {
                    if (checkCollision(aliens[i], stars[j], 28)) {
                        score += 10;
                        stars.splice(j, 1);
                        aliens.splice(i, 1);
                        alienRemoved = true;
                        break;
                    }
                }

                // Bottom Boundary Check
                if (!alienRemoved && aliens[i].y > canvas.height + 20) {
                    endGame("Oops! An alien floated past!");
                    return;
                }
            }

            // Draw Score Counter Panel
            ctx.fillStyle = '#66fcf1';
            ctx.font = 'bold 22px "Comic Sans MS"';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 20, 35);

            requestAnimationFrame(gameLoop);
        }

        // Mobile Friendly End Screen Layout
        function endGame(message) {
            gameOver = true;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            
            ctx.font = 'bold 38px "Comic Sans MS"';
            ctx.fillText("Game Over!", canvas.width / 2, canvas.height / 2 - 50);
            
            ctx.fillStyle = '#ffc107';
            ctx.font = '20px "Comic Sans MS"';
            // Wraps short text strings nicely
            ctx.fillText(message, canvas.width / 2, canvas.height / 2);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 26px "Comic Sans MS"';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 50);
            
            ctx.fillStyle = '#66fcf1';
            ctx.font = '18px "Comic Sans MS"';
            ctx.fillText("Tap the game screen to try again! 🎮", canvas.width / 2, canvas.height / 2 + 110);
        }

        // Core Launch initialization
        gameLoop();
    </script>
</body>
</html>
