<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Overdrive - V2</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff007f;
            --neon-warning: #ff3300;
            --dark-bg: #040408;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 540px;
            max-height: 960px;
            background: radial-gradient(circle at center, #0a0a14 0%, #040408 100%);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.05);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }
        .hud-element {
            position: absolute;
            pointer-events: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }
        #score-display {
            top: 25px;
            left: 25px;
            font-size: 18px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }
        #level-display {
            top: 25px;
            right: 25px;
            font-size: 18px;
            color: var(--neon-pink);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
            text-align: right;
        }
        #boss-ui {
            display: none;
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }
        #boss-name {
            font-size: 12px;
            color: var(--neon-warning);
            letter-spacing: 4px;
            margin-bottom: 5px;
            font-weight: 800;
            text-shadow: 0 0 8px var(--neon-warning);
        }
        #boss-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        #boss-bar-fill {
            width: 100%;
            height: 100%;
            background: var(--neon-warning);
            box-shadow: 0 0 10px var(--neon-warning);
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-display" class="hud-element">000000</div>
        <div id="level-display" class="hud-element">PHASE 1</div>
        <div id="boss-ui">
            <div id="boss-name" class="hud-element">ANOMALY DETECTED</div>
            <div id="boss-bar-container"><div id="boss-bar-fill"></div></div>
        </div>
        <canvas id="arcadeCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('arcadeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const levelDisplay = document.getElementById('level-display');
        const bossUi = document.getElementById('boss-ui');
        const bossBarFill = document.getElementById('boss-bar-fill');

        const GAME_WIDTH = 540;
        const GAME_HEIGHT = 960;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // V2 Engine Core States
        let score = 0;
        let level = 1;
        const MAX_LEVEL = 500;
        let gameState = 'START'; // START, WAVE, BOSS_WARNING, BOSS_FIGHT, GAMEOVER
        
        let frameCount = 0;
        let screenShake = 0;
        let warningOpacity = 0;
        
        let waveEnemiesKilled = 0;
        let waveTarget = 0;

        // Arrays
        let stars = [], lasers = [], enemyBullets = [], enemies = [], particles = [], floatingTexts = [];
        let boss = null;

        // Color Palette
        const C_CYAN = '#00f3ff';
        const C_PINK = '#ff007f';
        const C_WARN = '#ff3300';
        const C_DARK = '#111118';

        // Starfield
        for (let i = 0; i < 75; i++) {
            stars.push({
                x: Math.random() * GAME_WIDTH, y: Math.random() * GAME_HEIGHT,
                size: Math.random() * 2, speed: Math.random() * 3 + 1,
                color: Math.random() > 0.8 ? C_PINK : C_CYAN
            });
        }

        // ---------------- CLASSES ----------------

        class Particle {
            constructor(x, y, color, speedScale = 1) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 3 + 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 6 + 2) * speedScale;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.96; this.vy *= 0.96;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.restore();
            }
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.alpha = 1; this.vy = -1;
            }
            update() { this.y += this.vy; this.alpha -= 0.02; }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.font = '800 14px system-ui'; ctx.fillStyle = this.color;
                ctx.textAlign = 'center'; ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        // Micro-hitbox player for Bullet Hell mechanics
        const player = {
            x: GAME_WIDTH / 2, y: GAME_HEIGHT - 150,
            targetX: GAME_WIDTH / 2, targetY: GAME_HEIGHT - 150,
            tilt: 0,
            hitboxRadius: 4, // Extremely small core for dodging tight bullet patterns
            
            update() {
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                this.x += dx * 0.25;
                this.y += dy * 0.25;
                this.tilt = dx * 0.03;
                if(this.tilt > 0.3) this.tilt = 0.3;
                if(this.tilt < -0.3) this.tilt = -0.3;

                // Bounds
                if (this.x < 20) this.x = 20; if (this.x > GAME_WIDTH - 20) this.x = GAME_WIDTH - 20;
                if (this.y < 100) this.y = 100; if (this.y > GAME_HEIGHT - 40) this.y = GAME_HEIGHT - 40;

                // Fire
                if ((gameState === 'WAVE' || gameState === 'BOSS_FIGHT') && frameCount % 6 === 0) {
                    lasers.push({ x: this.x - 12, y: this.y - 20, vx: 0, vy: -20, dmg: 1 });
                    lasers.push({ x: this.x + 12, y: this.y - 20, vx: 0, vy: -20, dmg: 1 });
                }
            }
        };

        class Enemy {
            constructor() {
                this.x = Math.random() * (GAME_WIDTH - 80) + 40;
                this.y = -40;
                this.hp = 2 + Math.floor(level / 5);
                this.speed = 2 + (level * 0.02);
                this.wobble = Math.random() * Math.PI * 2;
                this.radius = 16;
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin(frameCount * 0.05 + this.wobble) * 1.5;
                
                // Drone occasionally fires a bullet at higher levels
                if (level > 3 && frameCount % Math.max(60, 150 - level) === 0 && Math.random() > 0.5) {
                    enemyBullets.push({
                        x: this.x, y: this.y,
                        vx: 0, vy: 5 + (level * 0.01),
                        type: 'standard'
                    });
                }
            }
        }

        // Sophisticated Procedural Boss Generator
        class Boss {
            constructor(lvl) {
                this.x = GAME_WIDTH / 2;
                this.y = -100;
                this.targetY = 150;
                
                this.maxHp = 150 + (lvl * 50); // Scales brutally
                this.hp = this.maxHp;
                
                this.radius = 45;
                this.angle = 0;
                this.phase = 0; // Internal attack patterns
                
                // Procedural difficulty parameters
                this.fireRate = Math.max(3, 20 - Math.floor(lvl / 10)); // Faster over time
                this.bulletSpeed = 3 + (lvl * 0.03);
                this.moveSpeed = 0.02 + (lvl * 0.0005);
                this.spiralAngle = 0;
            }

            update() {
                // Intro drop-in
                if (this.y < this.targetY) {
                    this.y += 2;
                    return;
                }

                this.angle += 0.02;
                
                // Sway horizontally
                this.x = (GAME_WIDTH / 2) + Math.sin(frameCount * this.moveSpeed) * (GAME_WIDTH/2 - 80);

                // Attack Patterns based on internal phase (swaps every 200 frames)
                if (frameCount % 200 === 0) this.phase = (this.phase + 1) % 3;

                if (frameCount % this.fireRate === 0) {
                    if (this.phase === 0) {
                        // Pattern 1: Targeted Spread
                        const angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);
                        this.shoot(angleToPlayer, this.bulletSpeed);
                        this.shoot(angleToPlayer - 0.2, this.bulletSpeed * 0.9);
                        this.shoot(angleToPlayer + 0.2, this.bulletSpeed * 0.9);
                    } 
                    else if (this.phase === 1) {
                        // Pattern 2: Mathematical Danmaku Spiral (Very difficult)
                        this.spiralAngle += 0.3;
                        this.shoot(this.spiralAngle, this.bulletSpeed * 0.8);
                        this.shoot(this.spiralAngle + Math.PI, this.bulletSpeed * 0.8);
                        // Add more arms to spiral at higher levels
                        if(level >= 20) {
                            this.shoot(this.spiralAngle + Math.PI/2, this.bulletSpeed * 0.8);
                            this.shoot(this.spiralAngle - Math.PI/2, this.bulletSpeed * 0.8);
                        }
                    }
                    else {
                        // Pattern 3: Arc blast
                        for(let i = -3; i <= 3; i++) {
                            if (frameCount % (this.fireRate * 3) === 0) {
                                this.shoot((Math.PI/2) + (i * 0.2), this.bulletSpeed * 1.2);
                            }
                        }
                    }
                }
            }

            shoot(angle, speed) {
                enemyBullets.push({
                    x: this.x, y: this.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    type: 'boss'
                });
            }
        }

        // ---------------- RENDER SYSTEMS ----------------

        function drawShip() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.tilt);

            // Engine Flame
            ctx.fillStyle = frameCount % 2 === 0 ? 'rgba(0,243,255,0.8)' : 'rgba(255,255,255,0.4)';
            ctx.beginPath(); ctx.moveTo(-4, 15); ctx.lineTo(0, 35 + Math.random()*10); ctx.lineTo(4, 15); ctx.fill();

            // Geometric Chassis
            ctx.fillStyle = C_DARK;
            ctx.strokeStyle = C_CYAN;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.lineTo(15, 10); ctx.lineTo(6, 15);
            ctx.lineTo(-6, 15); ctx.lineTo(-15, 10);
            ctx.closePath();
            ctx.fill(); ctx.stroke();

            // VULNERABLE CORE (Bullet Hell standard: glowing center)
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 10; ctx.shadowColor = '#ffffff';
            ctx.beginPath(); ctx.arc(0, 0, player.hitboxRadius, 0, Math.PI*2); ctx.fill();

            ctx.restore();
        }

        function drawEnemy(e) {
            ctx.save();
            ctx.translate(e.x, e.y);
            ctx.fillStyle = C_DARK; ctx.strokeStyle = C_PINK; ctx.lineWidth = 2;
            ctx.shadowBlur = 8; ctx.shadowColor = C_PINK;
            
            ctx.beginPath();
            ctx.moveTo(0, 15); ctx.lineTo(15, -10); ctx.lineTo(0, 0); ctx.lineTo(-15, -10);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            ctx.restore();
        }

        function drawBoss(b) {
            ctx.save();
            ctx.translate(b.x, b.y);
            
            // Rotating outer ring
            ctx.rotate(b.angle);
            ctx.strokeStyle = C_WARN; ctx.lineWidth = 3;
            ctx.shadowBlur = 15; ctx.shadowColor = C_WARN;
            ctx.beginPath();
            ctx.moveTo(-b.radius, -b.radius); ctx.lineTo(b.radius, b.radius);
            ctx.moveTo(b.radius, -b.radius); ctx.lineTo(-b.radius, b.radius);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, b.radius, 0, Math.PI*2);
            ctx.stroke();

            // Counter-rotating inner core
            ctx.rotate(-b.angle * 2.5);
            ctx.fillStyle = C_DARK;
            ctx.beginPath();
            ctx.moveTo(0, -25); ctx.lineTo(25, 0); ctx.lineTo(0, 25); ctx.lineTo(-25, 0);
            ctx.closePath();
            ctx.fill(); ctx.stroke();

            // Reactor Eye
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 20; ctx.shadowColor = '#ffffff';
            ctx.beginPath(); ctx.arc(0, 0, 10 + Math.sin(frameCount*0.1)*3, 0, Math.PI*2); ctx.fill();

            ctx.restore();
        }

        function drawOverlay(title, sub, color) {
            ctx.fillStyle = 'rgba(4, 4, 8, 0.85)';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            ctx.textAlign = 'center';
            ctx.shadowBlur = 20; ctx.shadowColor = color;
            ctx.fillStyle = '#ffffff'; ctx.font = '900 40px system-ui';
            ctx.fillText(title, GAME_WIDTH / 2, GAME_HEIGHT / 2 - 20);
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)'; ctx.font = '700 16px system-ui';
            ctx.fillText(sub, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 30);
        }

        // ---------------- CONTROLS ----------------
        
        function setTarget(e) {
            if (gameState === 'START' || gameState === 'GAMEOVER') {
                startGame(); return;
            }
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            player.targetX = (clientX - rect.left) * (GAME_WIDTH / rect.width);
            player.targetY = ((clientY - rect.top) * (GAME_HEIGHT / rect.height)) - 60; // Offset finger
        }

        window.addEventListener('touchstart', (e) => { setTarget(e); e.preventDefault(); }, {passive: false});
        window.addEventListener('touchmove', (e) => { setTarget(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('mousemove', setTarget);
        canvas.addEventListener('mousedown', setTarget);

        // ---------------- LOGIC ----------------

        function spawnExplosion(x, y, color, intensity = 15, scale = 1) {
            screenShake += intensity;
            for (let i = 0; i < intensity; i++) particles.push(new Particle(x, y, color, scale));
        }

        function formatScore(num) {
            return num.toString().padStart(6, '0');
        }

        function startGame() {
            score = 0; level = 1; gameState = 'WAVE';
            waveEnemiesKilled = 0; waveTarget = 10;
            lasers = []; enemyBullets = []; enemies = []; particles = []; floatingTexts = [];
            scoreDisplay.innerText = formatScore(score);
            levelDisplay.innerText = `L-${level} : WAVES`;
            player.x = GAME_WIDTH / 2; player.y = GAME_HEIGHT - 100;
            bossUi.style.display = 'none';
        }

        function initBossPhase() {
            gameState = 'BOSS_WARNING';
            warningOpacity = 1;
            enemies = []; // Clear field
            setTimeout(() => {
                boss = new Boss(level);
                gameState = 'BOSS_FIGHT';
                bossUi.style.display = 'flex';
                bossBarFill.style.width = '100%';
                levelDisplay.innerText = `L-${level} : BOSS`;
            }, 3000);
        }

        function loop() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            ctx.save();
            
            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                screenShake *= 0.85; 
                if(screenShake < 0.5) screenShake = 0;
            }

            // Starfield
            stars.forEach(star => {
                ctx.fillStyle = star.color; ctx.globalAlpha = 0.5;
                ctx.fillRect(star.x, star.y, star.size, star.size);
                star.y += star.speed;
                if (star.y > GAME_HEIGHT) { star.y = 0; star.x = Math.random() * GAME_WIDTH; }
            });
            ctx.globalAlpha = 1.0;

            if (gameState === 'START') {
                drawOverlay("NEON V2", "TAP OR SWIPE TO DEPLOY", C_CYAN);
            } else if (gameState === 'GAMEOVER') {
                bossUi.style.display = 'none';
                drawOverlay("SIGNAL LOST", `REACHED LEVEL ${level} | SCORE: ${score}`, C_PINK);
            } else {
                frameCount++;
                player.update();
                drawShip();

                // Player Lasers
                for (let i = lasers.length - 1; i >= 0; i--) {
                    let l = lasers[i];
                    l.x += l.vx; l.y += l.vy;
                    ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = C_CYAN;
                    ctx.fillRect(l.x - 2, l.y, 4, 20);
                    if (l.y < -30) lasers.splice(i, 1);
                }

                // Wave Logic
                if (gameState === 'WAVE') {
                    if (frameCount % Math.max(20, 60 - level) === 0 && enemies.length < 8) {
                        enemies.push(new Enemy());
                    }

                    for (let i = enemies.length - 1; i >= 0; i--) {
                        let e = enemies[i];
                        e.update(); drawEnemy(e);

                        if (e.y > GAME_HEIGHT + 30) { enemies.splice(i, 1); continue; }

                        // Body collision (forgiving)
                        if (Math.abs(e.x - player.x) < 20 && Math.abs(e.y - player.y) < 20) {
                            gameState = 'GAMEOVER'; spawnExplosion(player.x, player.y, C_CYAN, 30); continue;
                        }

                        // Laser hits Enemy
                        for (let j = lasers.length - 1; j >= 0; j--) {
                            if (Math.abs(e.x - lasers[j].x) < 20 && Math.abs(e.y - lasers[j].y) < 20) {
                                e.hp -= lasers[j].dmg;
                                lasers.splice(j, 1);
                                if (e.hp <= 0) {
                                    spawnExplosion(e.x, e.y, C_PINK);
                                    score += 10; scoreDisplay.innerText = formatScore(score);
                                    enemies.splice(i, 1);
                                    waveEnemiesKilled++;
                                    if (waveEnemiesKilled >= waveTarget) initBossPhase();
                                    break;
                                }
                            }
                        }
                    }
                }

                // Boss Phase Transition
                if (gameState === 'BOSS_WARNING') {
                    ctx.fillStyle = `rgba(255, 51, 0, ${Math.abs(Math.sin(frameCount * 0.1)) * 0.3})`;
                    ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);
                    
                    ctx.fillStyle = C_WARN; ctx.textAlign = 'center'; 
                    ctx.font = '900 40px system-ui'; ctx.shadowBlur = 20; ctx.shadowColor = C_WARN;
                    ctx.fillText("WARNING", GAME_WIDTH/2, GAME_HEIGHT/2);
                    ctx.shadowBlur = 0;
                }

                // Boss Fight Logic
                if (gameState === 'BOSS_FIGHT' && boss) {
                    boss.update();
                    drawBoss(boss);

                    // Update UI Bar
                    bossBarFill.style.width = `${(boss.hp / boss.maxHp) * 100}%`;

                    // Laser hits Boss
                    for (let j = lasers.length - 1; j >= 0; j--) {
                        if (Math.abs(boss.x - lasers[j].x) < boss.radius && Math.abs(boss.y - lasers[j].y) < boss.radius) {
                            boss.hp -= lasers[j].dmg;
                            lasers.splice(j, 1);
                            particles.push(new Particle(lasers[j]?.x || boss.x, boss.y + 20, C_WARN, 0.5)); // Spark
                            
                            if (boss.hp <= 0) {
                                spawnExplosion(boss.x, boss.y, C_WARN, 50, 3);
                                score += 1000 * level; scoreDisplay.innerText = formatScore(score);
                                floatingTexts.push(new FloatingText(GAME_WIDTH/2, GAME_HEIGHT/2, "SECTOR CLEARED", C_CYAN));
                                
                                boss = null;
                                bossUi.style.display = 'none';
                                
                                level++;
                                if(level > MAX_LEVEL) level = MAX_LEVEL;
                                waveTarget = 10 + (level * 2);
                                waveEnemiesKilled = 0;
                                
                                gameState = 'WAVE';
                                levelDisplay.innerText = `L-${level} : WAVES`;
                                enemyBullets = []; // Clear projectiles
                                break;
                            }
                        }
                    }
                }

                // Enemy Bullet Engine (Handles Drone & Boss projectiles)
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    let b = enemyBullets[i];
                    b.x += b.vx; b.y += b.vy;

                    ctx.fillStyle = b.type === 'boss' ? C_WARN : C_PINK;
                    ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
                    ctx.beginPath(); ctx.arc(b.x, b.y, b.type === 'boss' ? 5 : 4, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;

                    if (b.y > GAME_HEIGHT + 20 || b.x < -20 || b.x > GAME_WIDTH + 20) {
                        enemyBullets.splice(i, 1); continue;
                    }

                    // MICRO-HITBOX COLLISION (Dodging tight spaces)
                    const dist = Math.hypot(player.x - b.x, player.y - b.y);
                    if (dist < player.hitboxRadius + 4) {
                        gameState = 'GAMEOVER';
                        spawnExplosion(player.x, player.y, C_CYAN, 40);
                    }
                }
            }

            // Render FX
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].update(); floatingTexts[i].draw();
                if (floatingTexts[i].alpha <= 0) floatingTexts.splice(i, 1);
            }

            ctx.restore();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
